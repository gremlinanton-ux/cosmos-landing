<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVENOR</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  #scene { position: fixed; inset: 0; display: block; }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

// invisible HDRI studio: neutral room with large soft white area lights
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// --- AVENOR mark: right stroke with apex, cut left stroke, small accent ---
const rightStroke = new THREE.Shape([
  new THREE.Vector2(-0.205, 0.78),
  new THREE.Vector2(0, 1.15),
  new THREE.Vector2(1.05, -0.75),
  new THREE.Vector2(0.5, -0.75),
  new THREE.Vector2(0, 0.24)
]);
const leftStroke = new THREE.Shape([
  new THREE.Vector2(-1.05, -0.75),
  new THREE.Vector2(-0.36, 0.50),
  new THREE.Vector2(-0.16, -0.02),
  new THREE.Vector2(-0.5, -0.75)
]);
const accent = new THREE.Shape([
  new THREE.Vector2(0, -0.35),
  new THREE.Vector2(0.16, -0.72),
  new THREE.Vector2(-0.16, -0.72)
]);
const geo = new THREE.ExtrudeGeometry([rightStroke, leftStroke, accent], {
  depth: 0.42,
  bevelEnabled: true,
  bevelThickness: 0.16,
  bevelSize: 0.09,
  bevelSegments: 12,
  curveSegments: 16
});
geo.center();

// premium frosted crystal glass
const mat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 0.88,
  thickness: 1.2,
  ior: 1.52,
  roughness: 0.1,
  metalness: 0,
  clearcoat: 1,
  clearcoatRoughness: 0.06,
  envMapIntensity: 1.6,
  attenuationColor: new THREE.Color(0xf4f6ff),
  attenuationDistance: 2.5,
  specularIntensity: 1
});
const logo = new THREE.Mesh(geo, mat);
logo.scale.setScalar(1.25);
logo.rotation.x = -0.1;
logo.rotation.y = 0.3;
scene.add(logo);
window.__logo = logo;

// large soft white key/fill for traveling highlights on top of the room env
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(4, 6, 5);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.5);
fill.position.set(-6, -2, 4);
scene.add(fill);

// ultra-soft floating dust
const dustGeo = new THREE.BufferGeometry();
const DUST = 160;
const dustPos = new Float32Array(DUST * 3);
for (let i = 0; i < DUST; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 10;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 7;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 5;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.025, transparent: true, opacity: 0.22,
  depthWrite: false, sizeAttenuation: true
}));
scene.add(dust);

// --- Interaction: drag to rotate ---
let dragging = false, px = 0, py = 0;
let velX = 0, velY = 0;
canvas.addEventListener('pointerdown', e => { dragging = true; px = e.clientX; py = e.clientY; });
addEventListener('pointerup', () => dragging = false);
addEventListener('pointermove', e => {
  mouseX = (e.clientX / innerWidth - 0.5) * 2;
  mouseY = (e.clientY / innerHeight - 0.5) * 2;
  if (!dragging) return;
  velY = (e.clientX - px) * 0.005;
  velX = (e.clientY - py) * 0.005;
  px = e.clientX; py = e.clientY;
});
let mouseX = 0, mouseY = 0, parX = 0, parY = 0;

// --- Post: soft bloom ---
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.35, 1.0, 0.9));
composer.addPass(new OutputPass());

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();

  // weightless float + extremely slow rotation
  logo.rotation.y += velY + (window.__spin ?? 0.0012);
  logo.rotation.x += velX;
  velX *= 0.95; velY *= 0.95;
  logo.position.y = Math.sin(t * 0.5) * 0.08;
  logo.position.x = Math.sin(t * 0.33) * 0.04;

  // traveling reflections: slowly rotate the invisible studio around the glass
  scene.environmentRotation.y = t * 0.06;
  key.position.set(Math.sin(t * 0.1) * 6, 6, Math.cos(t * 0.1) * 6);

  // cinematic camera: subtle dolly + gentle mouse parallax
  parX += (mouseX * 0.25 - parX) * 0.02;
  parY += (-mouseY * 0.18 - parY) * 0.02;
  camera.position.x = parX + Math.sin(t * 0.11) * 0.12;
  camera.position.y = parY + Math.sin(t * 0.09) * 0.08;
  camera.position.z = 7 + Math.sin(t * 0.06) * 0.25;
  camera.lookAt(0, 0, 0);

  dust.rotation.y = t * 0.008;
  dust.position.y = Math.sin(t * 0.2) * 0.15;

  composer.render();
});
</script>
</body>
</html>
