/* ---------- FadingVideo: rAF-driven crossfade looping ---------- */
function FadingVideo({ src, className, style }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const video = ref.current;
    if (!video) return;
    const FADE_MS = 500, FADE_OUT_LEAD = 0.55;
    let raf = null;
    const fadingOutRef = { current: false };
    const fadeTo = (target, duration = FADE_MS) => {
      if (raf) cancelAnimationFrame(raf);
      const from = parseFloat(video.style.opacity || "0");
      const start = performance.now();
      const step = (now) => {
        const p = Math.min((now - start) / duration, 1);
        video.style.opacity = String(from + (target - from) * p);
        if (p < 1) raf = requestAnimationFrame(step);
      };
      raf = requestAnimationFrame(step);
    };
    const onLoaded = () => { video.style.opacity = "0"; video.play(); fadeTo(1); };
    const onTime = () => {
      const left = video.duration - video.currentTime;
      if (!fadingOutRef.current && left <= FADE_OUT_LEAD && left > 0) {
        fadingOutRef.current = true;
        fadeTo(0);
      }
    };
    const onEnded = () => {
      video.style.opacity = "0";
      setTimeout(() => {
        video.currentTime = 0;
        video.play();
        fadingOutRef.current = false;
        fadeTo(1);
      }, 100);
    };
    video.addEventListener("loadeddata", onLoaded);
    video.addEventListener("timeupdate", onTime);
    video.addEventListener("ended", onEnded);
    return () => {
      if (raf) cancelAnimationFrame(raf);
      video.removeEventListener("loadeddata", onLoaded);
      video.removeEventListener("timeupdate", onTime);
      video.removeEventListener("ended", onEnded);
    };
  }, []);
  return (
    <video ref={ref} src={src} className={className} style={{ opacity: 0, ...style }}
      autoPlay muted playsInline preload="auto" />
  );
}

/* ---------- BlurText: word-by-word blur-in ---------- */
function BlurText({ text, className }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <p ref={ref} className={className}
      style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}>
      {text.split(" ").map((w, i) => (
        <motion.span key={i}
          style={{ display: "inline-block", marginRight: "0.28em" }}
          initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
          animate={visible ? {
            filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
            opacity: [0, 0.5, 1],
            y: [50, -5, 0]
          } : {}}
          transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: (i * 100) / 1000 }}>
          {w}
        </motion.span>
      ))}
    </p>
  );
}

<script type="module">
import * as THREE from 'three';

function init() {
  const canvas = document.getElementById('scene');
  if (!canvas) { requestAnimationFrame(init); return; }

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });

  ectx.fillStyle = grad;
  ectx.fillRect(0, 0, 512, 256);
  for (const [x, y, r, c] of [

  const envTex = new THREE.CanvasTexture(envCanvas);

  // --- 3D logo: Avenor mark — right stroke with apex, cut left stroke, small accent ---

  const accent = new THREE.Shape([

  const geo = new THREE.ExtrudeGeometry([rightStroke, leftStroke, accent], {

  gctx.fillStyle = '#000';
  gctx.fillRect(0, 0, 512, 512);
  gctx.filter = 'blur(50px)';
  for (const [x, y, r, c] of [

    g.addColorStop(0, c);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    gctx.fillStyle = g;

  }
  const glowTex = new THREE.CanvasTexture(glowCanvas);
  glowTex.colorSpace = THREE.SRGBColorSpace;
  const backdrop = new THREE.Mesh(

  backdrop.position.set(0, -0.9, -3.5);
  scene.add(backdrop);

  // distant rim lights for soft glints (far away to avoid hot corner speculars)
  const lights = [
    [0xFF9E64, 80, [9, -3, 6]],
    [0x6E3FD1, 70, [-9, 3, 6]],
    [0xD6549F, 65, [-6, -7.5, 9]],
    [0xFF9E64, 50, [7.5, 6, -6]],

  ];
  for (const [c, i, p] of lights) {
    const l = new THREE.PointLight(c, i);
    l.position.set(...p);
    scene.add(l);
  }
  scene.add(new THREE.AmbientLight(0x140a22, 2));

  // --- Stars ---
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1200;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 30 + Math.random() * 40;

    starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i * 3 + 2] = r * Math.cos(phi);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.7 }));
  scene.add(stars);

  // --- Interaction: drag to rotate the logo ---
  let dragging = false, px = 0, py = 0;
  let velX = 0, velY = 0;
  canvas.addEventListener('pointerdown', e => { dragging = true; px = e.clientX; py = e.clientY; });
  addEventListener('pointerup', () => dragging = false);
  addEventListener('pointermove', e => {
    if (!dragging) return;
    velY = (e.clientX - px) * 0.005;
    velX = (e.clientY - py) * 0.005;
    px = e.clientX; py = e.clientY;
  });

  // --- Bloom glow ---
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.5, 1.0, 1.1);
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  function resize() {
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
  }
  addEventListener('resize', resize);
  resize();

  const clock = new THREE.Clock();
  renderer.setAnimationLoop(() => {
    const t = clock.getElapsedTime();
    logo.rotation.y += velY + (window.__spin ?? 0.0015);
    logo.rotation.x += velX;
    velX *= 0.95; velY *= 0.95;
    logo.position.y = -0.9 + Math.sin(t * 0.6) * 0.06;
    stars.rotation.y = t * 0.005;
    composer.render();
  });
}
init();
</script>
</body>
</html>
