<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVENOR</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  #scene { position: fixed; inset: 0; display: block; }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

// invisible dark studio: black void with large soft colored softboxes (brand palette)
// so color exists only as reflections and rim glow, never as a texture
const envCanvas = document.createElement('canvas');
envCanvas.width = 1024; envCanvas.height = 512;
const ectx = envCanvas.getContext('2d');
ectx.fillStyle = '#000';
ectx.fillRect(0, 0, 1024, 512);
for (const [x, y, r, c] of [
  [850, 200, 420, 'rgba(255,158,100,0.9)'],   // #FF9E64
  [200, 180, 380, 'rgba(110,63,209,0.9)'],    // #6E3FD1
  [520, 380, 360, 'rgba(214,84,159,0.85)'],   // #D6549F
  [520, 60, 250,  'rgba(255,220,190,0.5)'],
  [40, 420, 260,  'rgba(255,158,100,0.6)']
]) {
  const g = ectx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, c);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ectx.fillStyle = g;
  ectx.fillRect(0, 0, 1024, 512);
}
const envTex = new THREE.CanvasTexture(envCanvas);
envTex.mapping = THREE.EquirectangularReflectionMapping;
envTex.colorSpace = THREE.SRGBColorSpace;
scene.environment = envTex;

// --- AVENOR mark: right stroke with apex, cut left stroke, small accent ---
const rightStroke = new THREE.Shape([
  new THREE.Vector2(-0.205, 0.78),
  new THREE.Vector2(0, 1.15),
  new THREE.Vector2(1.05, -0.75),
  new THREE.Vector2(0.5, -0.75),
  new THREE.Vector2(0, 0.24)
]);
const leftStroke = new THREE.Shape([
  new THREE.Vector2(-1.05, -0.75),
  new THREE.Vector2(-0.36, 0.50),
  new THREE.Vector2(-0.16, -0.02),
  new THREE.Vector2(-0.5, -0.75)
]);
const accent = new THREE.Shape([
  new THREE.Vector2(0, -0.35),
  new THREE.Vector2(0.16, -0.72),
  new THREE.Vector2(-0.16, -0.72)
]);
const geo = new THREE.ExtrudeGeometry([rightStroke, leftStroke, accent], {
  depth: 0.42,
  bevelEnabled: true,
  bevelThickness: 0.16,
  bevelSize: 0.09,
  bevelSegments: 12,
  curveSegments: 16
});
geo.center();

// transparent crystal glass — body passes the background, color lives in reflections
const mat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 1,
  thickness: 0.6,
  ior: 1.52,
  roughness: 0.22,
  metalness: 0,
  iridescence: 1,
  iridescenceIOR: 1.4,
  iridescenceThicknessRange: [150, 900],
  clearcoat: 1,
  clearcoatRoughness: 0.03,
  envMapIntensity: 4,
  attenuationColor: new THREE.Color(0xffd9c4),
  attenuationDistance: 4,
  specularIntensity: 1
});
const logo = new THREE.Mesh(geo, mat);
logo.scale.setScalar(1.25);
logo.rotation.x = -0.1;
logo.rotation.y = 0.3;
scene.add(logo);
window.__logo = logo;

// distant palette rim lights for colored glints on the bevels
const key = new THREE.DirectionalLight(0xFF9E64, 1.2);
key.position.set(4, 6, 5);
scene.add(key);
const fill = new THREE.DirectionalLight(0x6E3FD1, 0.7);
fill.position.set(-6, -2, 4);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xD6549F, 0.8);
rim.position.set(0, -5, -4);
scene.add(rim);

// three invisible brand-color lights, far from the glass:
// purple upper-left, orange upper-right, pink at the viewer's position
// (the pink one travels with the camera so the front faces always catch a sheen)
const purpleLight = new THREE.PointLight(0x6E3FD1, 45);
purpleLight.position.set(-6, 4, 3);
scene.add(purpleLight);
const orangeLight = new THREE.PointLight(0xFF9E64, 45);
orangeLight.position.set(6, 3, 3);
scene.add(orangeLight);
const viewerLight = new THREE.PointLight(0xD6549F, 180);
viewerLight.position.copy(camera.position);
scene.add(viewerLight);

// extra invisible lights covering the previously dark zones
const extraLights = [];
for (const [color, intensity, pos] of [
  [0xFF9E64, 45, [5, -4, 3]],    // bottom-right
  [0x6E3FD1, 45, [-5, -4, 3]],   // bottom-left
  [0xD6549F, 40, [0, 5, -3]],    // top-back
  [0xFF9E64, 35, [0, -1, -6]]    // back rim
]) {
  const l = new THREE.PointLight(color, intensity);
  l.position.set(...pos);
  scene.add(l);
  extraLights.push({ l, base: intensity, phase: extraLights.length * 1.7 });
}

// two visible ultra-soft white star glows filling the empty corners
const glowCanvas = document.createElement('canvas');
glowCanvas.width = glowCanvas.height = 256;
const gctx = glowCanvas.getContext('2d');
const gg = gctx.createRadialGradient(128, 128, 0, 128, 128, 128);
gg.addColorStop(0, 'rgba(255,255,255,0.28)');
gg.addColorStop(0.3, 'rgba(255,255,255,0.18)');
gg.addColorStop(0.6, 'rgba(255,255,255,0.07)');
gg.addColorStop(1, 'rgba(255,255,255,0)');
gctx.fillStyle = gg;
gctx.fillRect(0, 0, 256, 256);
const glowTex = new THREE.CanvasTexture(glowCanvas);

const starGlows = [];
for (const [nx, y, scale, phase] of [
  [-0.85, 2.2, 8.5, 0],
  [0.85, -2.2, 7.5, 2.4]
]) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color: 0xffffff, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  s.position.set(0, y, -1);
  s.scale.setScalar(scale);
  scene.add(s);
  starGlows.push({ s, nx, y, phase });
}

// ultra-soft floating dust
const dustGeo = new THREE.BufferGeometry();
const DUST = 160;
const dustPos = new Float32Array(DUST * 3);
for (let i = 0; i < DUST; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 10;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 7;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 5;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.025, transparent: true, opacity: 0.22,
  depthWrite: false, sizeAttenuation: true
}));
scene.add(dust);

// --- Interaction: drag to rotate ---
let dragging = false, px = 0, py = 0;
let velX = 0, velY = 0;
canvas.addEventListener('pointerdown', e => { dragging = true; px = e.clientX; py = e.clientY; });
addEventListener('pointerup', () => dragging = false);
addEventListener('pointermove', e => {
  mouseX = (e.clientX / innerWidth - 0.5) * 2;
  mouseY = (e.clientY / innerHeight - 0.5) * 2;
  if (!dragging) return;
  velY = (e.clientX - px) * 0.005;
  velX = (e.clientY - py) * 0.005;
  px = e.clientX; py = e.clientY;
});
let mouseX = 0, mouseY = 0, parX = 0, parY = 0;

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();

  // weightless float + extremely slow rotation
  logo.rotation.y += velY + (window.__spin ?? 0.0012);
  logo.rotation.x += velX;
  velX *= 0.95; velY *= 0.95;
  logo.position.y = Math.sin(t * 0.5) * 0.08;
  logo.position.x = Math.sin(t * 0.33) * 0.04;

  // traveling reflections: slowly rotate the invisible studio around the glass
  scene.environmentRotation.y = t * 0.06;
  key.position.set(Math.sin(t * 0.1) * 6, 6, Math.cos(t * 0.1) * 6);

  // cinematic camera: subtle dolly + gentle mouse parallax
  parX += (mouseX * 0.25 - parX) * 0.02;
  parY += (-mouseY * 0.18 - parY) * 0.02;
  camera.position.x = parX + Math.sin(t * 0.11) * 0.12;
  camera.position.y = parY + Math.sin(t * 0.09) * 0.08;
  camera.position.z = 7 + Math.sin(t * 0.06) * 0.25;
  camera.lookAt(0, 0, 0);

  dust.rotation.y = t * 0.008;
  dust.position.y = Math.sin(t * 0.2) * 0.15;

  // gentle breathing of the invisible lights; viewer light rides the camera
  purpleLight.intensity = 45 * (1 + Math.sin(t * 0.5) * 0.12);
  orangeLight.intensity = 45 * (1 + Math.sin(t * 0.6 + 2) * 0.12);
  viewerLight.position.copy(camera.position);
  viewerLight.intensity = 180 * (1 + Math.sin(t * 0.4 + 4) * 0.1);
  for (const e of extraLights) {
    e.l.intensity = e.base * (1 + Math.sin(t * 0.55 + e.phase) * 0.12);
  }

  // corner star glows: hug the screen corners, breathe very gently
  const glowHalfW = Math.tan(camera.fov * Math.PI / 360) * 8 * camera.aspect;
  for (const g of starGlows) {
    g.s.position.x = g.nx * glowHalfW;
    g.s.position.y = g.y + Math.sin(t * 0.3 + g.phase) * 0.1;
    g.s.material.opacity = 0.34 + Math.sin(t * 0.45 + g.phase) * 0.08;
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
