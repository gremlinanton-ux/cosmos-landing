<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avenor 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  #scene { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

// --- Environment: brand palette gradient  #FF9E64 / #D6549F / #6E3FD1 ---
const envCanvas = document.createElement('canvas');
envCanvas.width = 512; envCanvas.height = 256;
const ectx = envCanvas.getContext('2d');
const grad = ectx.createLinearGradient(0, 0, 512, 256);
grad.addColorStop(0.0, '#170b2e');
grad.addColorStop(0.22, '#6E3FD1');
grad.addColorStop(0.45, '#D6549F');
grad.addColorStop(0.62, '#FF9E64');
grad.addColorStop(0.8, '#6E3FD1');
grad.addColorStop(1.0, '#0d0620');
ectx.fillStyle = grad;
ectx.fillRect(0, 0, 512, 256);
// bright hotspots so glass gets specular streaks
for (const [x, y, r, c] of [
  [380, 90, 90, 'rgba(255,158,100,0.95)'],
  [140, 160, 70, 'rgba(110,63,209,0.9)'],
  [260, 60, 50, 'rgba(255,255,255,0.85)'],
  [60, 70, 55, 'rgba(214,84,159,0.9)'],
  [460, 180, 60, 'rgba(255,158,100,0.7)'],
  [320, 200, 45, 'rgba(214,84,159,0.8)']
]) {
  const g = ectx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, c); g.addColorStop(1, 'rgba(0,0,0,0)');
  ectx.fillStyle = g;
  ectx.fillRect(0, 0, 512, 256);
}
const envTex = new THREE.CanvasTexture(envCanvas);
envTex.mapping = THREE.EquirectangularReflectionMapping;
envTex.colorSpace = THREE.SRGBColorSpace;
scene.environment = envTex;

// --- 3D logo: Avenor mark — right stroke with apex, cut left stroke, small accent ---
// right stroke including the apex; its lower-left edge is the cut line
const rightStroke = new THREE.Shape([
  new THREE.Vector2(-0.205, 0.78),
  new THREE.Vector2(0, 1.15),
  new THREE.Vector2(1.05, -0.75),
  new THREE.Vector2(0.5, -0.75),
  new THREE.Vector2(0, 0.24)
]);
// left stroke, terminated by the diagonal cut below the apex
const leftStroke = new THREE.Shape([
  new THREE.Vector2(-1.05, -0.75),
  new THREE.Vector2(-0.30, 0.60),
  new THREE.Vector2(-0.10, 0.05),
  new THREE.Vector2(-0.5, -0.75)
]);
// small inner accent triangle at the base
const accent = new THREE.Shape([
  new THREE.Vector2(0, -0.35),
  new THREE.Vector2(0.16, -0.72),
  new THREE.Vector2(-0.16, -0.72)
]);
const geo = new THREE.ExtrudeGeometry([rightStroke, leftStroke, accent], {
  depth: 0.45,
  bevelEnabled: true,
  bevelThickness: 0.12,
  bevelSize: 0.05,
  bevelSegments: 8
});
geo.center();

// procedural noise: watery bump + varying iridescence film thickness -> gradient swirls
const bumpCanvas = document.createElement('canvas');
bumpCanvas.width = bumpCanvas.height = 256;
const bctx = bumpCanvas.getContext('2d');
bctx.fillStyle = '#404040';
bctx.fillRect(0, 0, 256, 256);
bctx.filter = 'blur(28px)';
for (let i = 0; i < 5; i++) {
  const x = Math.random() * 256, y = Math.random() * 256, r = 100 + Math.random() * 120;
  const g = bctx.createRadialGradient(x, y, 0, x, y, r);
  const vv = Math.floor(Math.random() * 255);
  g.addColorStop(0, `rgba(${vv},${vv},${vv},0.55)`);
  g.addColorStop(1, 'rgba(64,64,64,0)');
  bctx.fillStyle = g;
  bctx.fillRect(0, 0, 256, 256);
}
const bumpTex = new THREE.CanvasTexture(bumpCanvas);
bumpTex.wrapS = bumpTex.wrapT = THREE.RepeatWrapping;

const mat = new THREE.MeshPhysicalMaterial({
  bumpMap: bumpTex,
  bumpScale: 0.5,
  iridescenceThicknessMap: bumpTex,
  transmission: 1,
  thickness: 0.5,
  roughness: 0.03,
  metalness: 0,
  ior: 1.31,
  iridescence: 1,
  iridescenceIOR: 1.9,
  iridescenceThicknessRange: [150, 1200],
  clearcoat: 1,
  clearcoatRoughness: 0.04,
  envMapIntensity: 4,
  attenuationColor: new THREE.Color(0xffb0c0),
  attenuationDistance: 3.5,
  color: 0xffffff
});
const logo = new THREE.Mesh(geo, mat);
logo.scale.setScalar(1.15);
logo.rotation.x = -0.12;
logo.rotation.y = 0.35;
scene.add(logo);
window.__logo = logo;

// brand-colored rim lights for glints from different sides
const lights = [
  [0xFF9E64, 70, [3, -1, 2]],
  [0x6E3FD1, 55, [-3, 1, 2]],
  [0xD6549F, 50, [-2, -2.5, 3]],
  [0xFF9E64, 30, [2.5, 2, -2]],
  [0xfff0e0, 35, [0, 3, 3]]
];
for (const [c, i, p] of lights) {
  const l = new THREE.PointLight(c, i);
  l.position.set(...p);
  scene.add(l);
}
scene.add(new THREE.AmbientLight(0x140a22, 2));

// --- Stars ---
const starGeo = new THREE.BufferGeometry();
const starCount = 1200;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const r = 30 + Math.random() * 40;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i * 3 + 2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.7 }));
scene.add(stars);

// --- Interaction: drag to rotate the logo ---
let dragging = false, px = 0, py = 0;
let velX = 0, velY = 0;
canvas.addEventListener('pointerdown', e => { dragging = true; px = e.clientX; py = e.clientY; });
addEventListener('pointerup', () => dragging = false);
addEventListener('pointermove', e => {
  if (!dragging) return;
  velY = (e.clientX - px) * 0.005;
  velX = (e.clientY - py) * 0.005;
  px = e.clientX; py = e.clientY;
});

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();
  logo.rotation.y += velY + 0.0015;
  logo.rotation.x += velX;
  velX *= 0.95; velY *= 0.95;
  logo.position.y = Math.sin(t * 0.6) * 0.06; // gentle float, centered
  stars.rotation.y = t * 0.005;
  renderer.render(scene, camera);
});
</script>
</body>
</html>
